<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8">
        <title>Journal Site</title>
        
    </head>
        <body>
            <h1>Welkom op de jorunal site</h1>
            <nav>
                <a href="{{ url_for('home')  }}">Home</a>
                {% if current_user.is_authenticated %}
                    <span>Welkom, {{ current_user.username }}!</span>
                    <a href="#">Mijn Journal</a>
                    <a href="{{ url_for('logout')}}">Uitloggen</a>
                {% else %}
                    <a href="{{ url_for('register') }}">Registreren</a>  
                    <a href="{{ url_for('login') }}">Inloggen</a>
                {% endif %}
               
            </nav>

            <div class="container">
                {% block content %}{% endblock %}
            </div>

        </body>
</html>
