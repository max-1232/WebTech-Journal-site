{% extends "base.html" %}
<!-- Registreer pagina waar een gebruiker een account kan aanmaken -->
{% block content %}
    <h2>Account aanmaken</h2>
    <form method="POST">
        <label for="username">Gebruikersnaam</label>
        <input type="text" name="username" placeholder="Kies een naam" required>

        <label for="email">Email</label>
        <input type="email" name="email" placeholder="Vul je email in" required>

        <label for="password">Wachtwoord</label>
        <input type="password" name="password" placeholder="Kies een wachtwoord" required>

        <button type="submit">Registreren</button>
    </form>
    <p>Heb je al een account? <a href="{{ url_for('auth.login') }}">Log hier in</a></p>
{% endblock %}
