{% extends "base.html" %}

{% block content %}
    <h2>Account aanmaken</h2>
    <form method="POST">
        <label for="username">Gebruikersnaam</label>
        <input type="text" name="username" placeholder="Kies een naam" required>

        <label for="username">Email</label>
        <input type="text" name="email" placeholder="Vul je email in" required>

        <label for="username">Wachtwoord</label>
        <input type="text" name="password" placeholder="Kies een wachtwoord" required>

        <button type="submit">Registreren</button>
    </form>
    <p>Heb je al een account? <a href="{{ url_for('auth.login') }}">Log hier in</a></p>
{% endblock %}
